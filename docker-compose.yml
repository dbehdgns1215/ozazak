version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ozazak-postgres
    environment:
      POSTGRES_DB: ozazak
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ozazak-network

  redis:
    image: redis:7-alpine
    container_name: ozazak-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - ozazak-network

  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozazak-back
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ozazak
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8080:8080"
    networks:
      - ozazak-network

volumes:
  postgres-data:
  redis-data:

networks:
  ozazak-network:
    driver: bridge
