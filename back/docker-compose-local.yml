version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ozazak-postgres-local
    environment:
      POSTGRES_DB: ${DB_NAME:-ozazak}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data-local:/var/lib/postgresql/data
    networks:
      - ozazak-network

  redis:
    image: redis:7-alpine
    container_name: ozazak-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis-data-local:/data
    networks:
      - ozazak-network

  ai-service:
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: ozazak-ai-local
    env_file:
      - ../ai/.env
    environment:
      - BACKEND_API_BASE_URL=http://ozazak-back-local:8080
      - APP_ENV=development
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:80}
    volumes:
      - ../ai/src:/app/src
    restart: unless-stopped
    networks:
      - ozazak-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozazak-back-local
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      # 로컬 DB/Redis 연결을 위해 서비스명 사용 (기존 .env가 localhost라면 오버라이드 필요할 수 있음)
      SPRING_DATASOURCE_URL: jdbc:postgresql://ozazak-postgres-local:5432/${DB_NAME:-ozazak}
      SPRING_DATA_REDIS_HOST: ozazak-redis-local
    ports:
      - "8080:8080"
    networks:
      - ozazak-network
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: ozazak-nginx-local
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ai-service
      - back
    networks:
      - ozazak-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres-data-local:
  redis-data-local:


networks:
  ozazak-network:
    driver: bridge
