version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: ozazak-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - back
      - ai-service
      - jenkins
    networks:
      - ozazak-network
    restart: always

  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozazak-back-prod
    depends_on:
      - postgres
      - redis
    env_file:
      - .env.prod
    environment:
      TZ: Asia/Seoul
      # Nginx 설정파일의 upstream 이름과 맞추기 위해 alias 고려 필요
    networks:
      - ozazak-network
    restart: always

  ai-service:
    build:
      context: ../ai  # AI 프로젝트의 실제 운영 경로로 확인 필요
      dockerfile: Dockerfile
    container_name: ozazak-ai-prod
    env_file:
      - ../ai/.env
    environment:
      - TZ=Asia/Seoul
      - BACKEND_API_BASE_URL=http://ozazak-back-prod:8080
      - APP_ENV=production
    networks:
      - ozazak-network
    restart: always

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    volumes:
      - /home/ubuntu/jenkins/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    networks:
      - ozazak-network
    restart: always

  postgres:
    image: postgres:15
    container_name: ozazak-postgres-prod
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - ozazak-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ozazak-redis-prod
    environment:
      TZ: Asia/Seoul
    volumes:
      - redis-prod-data:/data
    networks:
      - ozazak-network
    restart: always

volumes:
  postgres-prod-data:
  redis-prod-data:

networks:
  ozazak-network:
    driver: bridge