version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: ozazak-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /home/ubuntu/S14P11B205/back/nginx/nginx-prod.conf:/etc/nginx/nginx.conf
      - /home/ubuntu/S14P11B205/front/build:/usr/share/nginx/html
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - back
      - ai-service
    networks:
      - ozazak-network
    restart: always


  back:
    image: ozazak-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozazak-back-prod
    depends_on:
      - postgres
      - redis
    env_file:
      - .env.prod
    environment:
      - TZ=Asia/Seoul
      - SPRING_PROFILES_ACTIVE=prod
      - FASTAPI_URL=http://ozazak-ai-prod:8000
    networks:
      - ozazak-network
    restart: always

  ai-service:
    image: ozazak-ai-service:latest
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: ozazak-ai-prod
    env_file:
      - ../ai/.env
    environment:
      - TZ=Asia/Seoul
      - BACKEND_API_BASE_URL=http://ozazak-back-prod:8080
      - APP_ENV=production
    networks:
      - ozazak-network
    restart: always

  postgres:
    image: pgvector/pgvector:pg15
    container_name: ozazak-postgres-prod
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - ozazak-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ozazak-redis-prod
    environment:
      TZ: Asia/Seoul
    volumes:
      - redis-prod-data:/data
    networks:
      - ozazak-network
    restart: always

volumes:
  postgres-prod-data:
  redis-prod-data:

networks:
  ozazak-network:
    external: true  # prod 컴포즈에서 생성한 네트워크 사용