version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: ozazak-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - back
      - jenkins
      - ai-service
    networks:
      - ozazak-network
    restart: always

  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozazak-back-prod
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    networks:
      - ozazak-network
    restart: always

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    volumes:
      - /home/ubuntu/jenkins/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    networks:
      - ozazak-network
    restart: always

  postgres:
    image: postgres:15
    container_name: ozazak-postgres-prod
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - ozazak-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ozazak-redis-prod
    environment:
      TZ: Asia/Seoul
    volumes:
      - redis-prod-data:/data
    networks:
      - ozazak-network
    restart: always

  ai-service:
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: ozazak-ai-prod
    environment:
      - GMS_API_KEY=${GMS_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL}
      - GPT_MODEL=${GPT_MODEL}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL}
      - CLAUDE_MODEL=${CLAUDE_MODEL}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - BACKEND_API_BASE_URL=${BACKEND_API_BASE_URL:-http://ozazak-back-prod:8080}
      - BACKEND_API_TIMEOUT=${BACKEND_API_TIMEOUT:-30}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_ENV=production
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - ../ai/src:/app/src
    restart: always
    networks:
      - ozazak-network

volumes:
  postgres-prod-data:
  redis-prod-data:


networks:
  ozazak-network:
    driver: bridge
