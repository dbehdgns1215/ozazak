version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: ozazak-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - back
      - jenkins
    networks:
      - ozazak-network
    restart: always

  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozazak-back-prod
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    networks:
      - ozazak-network
    restart: always

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    volumes:
      - /home/ubuntu/jenkins/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
    networks:
      - ozazak-network
    restart: always

  postgres:
    image: postgres:15
    container_name: ozazak-postgres-prod
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
    networks:
      - ozazak-network
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ozazak-redis-prod
    environment:
      TZ: Asia/Seoul
    volumes:
      - redis-prod-data:/data
    networks:
      - ozazak-network
    restart: always

volumes:
  postgres-prod-data:
  redis-prod-data:

networks:
  ozazak-network:
    driver: bridge