version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    user: root
    ports:
      - "8081:8080"  # Jenkins UI (nginx 프록시 안 쓸 경우)
      - "50000:50000"  # Jenkins agent
    volumes:
      - /home/ubuntu/jenkins/jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      # Jenkins가 호스트 파일시스템에 배포하기 위한 볼륨 마운트
      - /home/ubuntu/S14P11B205:/home/ubuntu/S14P11B205
      - /home/ubuntu/nginx:/home/ubuntu/nginx
    environment:
      TZ: Asia/Seoul
    networks:
      - ozazak-network
    restart: always

networks:
  ozazak-network:
    external: true  # prod 컴포즈에서 생성한 네트워크 사용
