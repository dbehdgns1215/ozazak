version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: ozazak-postgres-local
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres-data-local:/var/lib/postgresql/data
    networks:
      - ozazak-network

  redis:
    image: redis:7-alpine
    container_name: ozazak-redis-local
    ports:
      - "6379:6379"
    volumes:
      - redis-data-local:/data
    networks:
      - ozazak-network

  nginx:
    image: nginx:alpine
    container_name: ozazak-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - back
      - ai
    networks:
      - ozazak-network

  back:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ozazak-back-local
    depends_on:
      - postgres
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: local
      JWT_SECRET: ${JWT_SECRET:-local-test-jwt-secret-key-for-development}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      SPRING_MAIL_HOST: localhost
      SPRING_MAIL_PORT: 1025
    expose:
      - "8080"
    networks:
      - ozazak-network

  ai:
    build:
      context: ../ai
      dockerfile: Dockerfile
    container_name: ozazak-ai-local
    depends_on:
      - back
    environment:
      - GMS_API_KEY=${GMS_API_KEY}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gemini-flash}
      - GPT_MODEL=${GPT_MODEL:-gpt-5.1}
      - GEMINI_PRO_MODEL=${GEMINI_PRO_MODEL:-gemini-2.5-pro}
      - GEMINI_FLASH_MODEL=${GEMINI_FLASH_MODEL:-gemini-2.5-flash-lite}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash-lite}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - SERPER_API_KEY=${SERPER_API_KEY}
      - BACKEND_API_BASE_URL=http://back:8080
      - BACKEND_API_TIMEOUT=${BACKEND_API_TIMEOUT:-30}
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - APP_ENV=${APP_ENV:-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    volumes:
      - ../ai/src:/app/src
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - ozazak-network

volumes:
  postgres-data-local:
  redis-data-local:

networks:
  ozazak-network:
    driver: bridge

