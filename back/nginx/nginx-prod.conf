events {
    worker_connections 1024;
}

http {
    # [중요] 리액트 빌드 파일(CSS/JS) 인식을 위해 필수
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 로깅
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # AI Service
    upstream ai_service {
        server ozazak-ai-prod:8000;
    }

    # Spring Backend
    upstream spring_service {
        server ozazak-back-prod:8080;
    }

    # 메인 서버 (HTTPS)
    server {
        listen 443 ssl;
        server_name i14b205.p.ssafy.io;

        # SSL 인증서 (메인 도메인용 하나면 충분합니다)
        ssl_certificate /etc/letsencrypt/live/i14b205.p.ssafy.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/i14b205.p.ssafy.io/privkey.pem;

        client_max_body_size 10M;

        # 헬스체크
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        # 1. '/jenkins' 라고만 치면 -> '/jenkins/'로 강제 이동 (슬래시 붙이기)
        location = /jenkins {
            return 301 https://$host/jenkins/;
        }

        location ^~ /jenkins/ {
            proxy_pass http://jenkins_service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 젠킨스 필수 헤더
            proxy_redirect http:// https://;
            proxy_http_version 1.1;
            proxy_request_buffering off;
            proxy_buffering off;

            # (선택) SSH 사용 시 필요
            add_header 'X-SSH-Endpoint' 'i14b205.p.ssafy.io:50000' always;
        }

        # 2. AI 요청 (기존 설정 완벽 유지 - SSE 최적화)
        location = /api/ai/health {
            proxy_pass http://ai_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ai/ {
            proxy_pass http://ai_service/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;

            # SSE 스트리밍 설정 유지
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
        }

        # 3. Backend 요청 (기존 유지)
        location /api/ {
            proxy_pass http://spring_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
        }

        # Swagger
        location /swagger-ui/ {
            proxy_pass http://spring_service/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        location = /swagger-ui.html {
            proxy_pass http://spring_service/swagger-ui.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /v3/api-docs {
            proxy_pass http://spring_service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }


        # ---------------------------------------------------------
        # 4. [변경] Frontend 정적 파일 (로컬 서빙)
        # Docker Volume으로 연결된 /usr/share/nginx/html 폴더를 참조합니다.
        # ---------------------------------------------------------
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;

            # [중요] React SPA 라우팅 지원
            # (새로고침 시 404 방지 -> index.html로 보냄)
            try_files $uri $uri/ /index.html;

            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # 에러 페이지
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # HTTP -> HTTPS 리다이렉트
    server {
        listen 80;
        server_name i14b205.p.ssafy.io;
        return 301 https://$host$request_uri;
    }
}