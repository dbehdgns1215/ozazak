events {
    worker_connections 1024;
}

http {
    # 로깅
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # AI Service
    upstream ai_service {
        server ozazak-ai-prod:8000;
    }

    # Spring Backend (프로덕션: ozazak-back-prod)
    upstream spring_service {
        server ozazak-back-prod:8080;
    }

    # 메인 서버 (ozazak.13.124.6.228.nip.io)
    server {
        listen 80;
        server_name ozazak.13.124.6.228.nip.io;
        client_max_body_size 10M;

        # 헬스체크
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        # AI 헬스체크 (별도 라우팅)
        location = /api/ai/health {
            proxy_pass http://ai_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI 요청 라우팅
        location /api/ai/ {
            proxy_pass http://ai_service/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            
            # SSE 스트리밍
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
        }

        # Backend 요청 라우팅
        location /api/ {
            proxy_pass http://spring_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
        }

        # Swagger UI
        location /swagger-ui/ {
            proxy_pass http://spring_service/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Swagger redirect
        location = /swagger-ui.html {
            proxy_pass http://spring_service/swagger-ui.html;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # OpenAPI docs
        location /v3/api-docs {
            proxy_pass http://spring_service/v3/api-docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Frontend 정적 파일 (S3 프록시)
        location / {
            proxy_pass http://ozazak.s3-website.ap-northeast-2.amazonaws.com/;
            proxy_set_header Host ozazak.s3-website.ap-northeast-2.amazonaws.com;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA 라우팅 지원 (404 시 index.html 반환)
            proxy_intercept_errors on;
            error_page 404 = /index.html;

            # 캐싱 설정
            proxy_cache_valid 200 1h;
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # 에러 페이지
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }

    # 젠킨스 전용 서버 (jenkins.13.124.6.228.nip.io)
    server {
        listen 80;
        server_name jenkins.13.124.6.228.nip.io;

        # Docker DNS resolver (동적 resolve - Jenkins 없어도 nginx 시작 가능)
        resolver 127.0.0.11 valid=30s;

        location / {
            set $jenkins_upstream http://jenkins:8080;
            proxy_pass $jenkins_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Jenkins WebSocket 지원
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 90s;
        }
    }
}
