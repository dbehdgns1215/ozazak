events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream ai_service {
        server ozazak-ai-prod:8000;
    }

    upstream spring_service {
        server ozazak-back-prod:8080;
    }

    upstream jenkins_service {
        server jenkins:8080; # 젠킨스는 서비스명과 컨테이너명이 동일
    }

    server {
        listen 80;
        server_name _;
        client_max_body_size 10M;

        # AI 요청 (SSE 최적화)
        location /api/ai/ {
            proxy_pass http://ai_service/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_http_version 1.1;
            proxy_read_timeout 600s;
        }

        # Spring 백엔드 요청
        location /api/ {
            proxy_pass http://spring_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 루트 경로 처리 (백엔드 메인)
        location / {
            proxy_pass http://spring_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

    # 젠킨스 전용 서버
    server {
        listen 80;
        server_name jenkins.13.124.6.228.nip.io;

        location / {
            proxy_pass http://jenkins_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}