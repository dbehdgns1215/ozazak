events {}

http {
    # 1. AI Service Group (Docker Network)
    upstream ai_service {
        server ozazak-ai-local:8000;
    }

    # 2. Spring Backend Group
    upstream spring_service {
        # Using Docker container internal DNS ('ozazak-back-local') since 'back' service is now running in Docker
        server ozazak-back-local:8080;
    }

    server {
        listen 80;
        
        # Increase text buffer size for large payloads (e.g. cover letters)
        client_max_body_size 10M;

        # Route: AI Requests
        location /api/ai/ {
            proxy_pass http://ai_service/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Streaming Support (SSE)
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
        }

        # Route: Backend Requests
        location /api/ {
            proxy_pass http://spring_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
