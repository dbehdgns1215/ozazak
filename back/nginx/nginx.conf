events {
    worker_connections 1024;
}

http {
    # 로깅
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # AI Service
    upstream ai_service {
        server ozazak-ai-local:8000;
    }

    # Spring Backend (로컬: ozazak-back-local, 프로덕션: ozazak-back-prod)
    upstream spring_service {
        server ozazak-back-local:8080;  # Docker Compose 내의 Backend
    }

    server {
        listen 80;
        client_max_body_size 10M;

        # 헬스체크
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        # AI 헬스체크 (별도 라우팅)
        location = /api/ai/health {
            proxy_pass http://ai_service/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # AI 요청 라우팅
        location /api/ai/ {
            proxy_pass http://ai_service/api/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;  # 🆕 JWT 전달
            
            # SSE 스트리밍
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_connect_timeout 60s;
        }

        # Backend 요청 라우팅
        location /api/ {
            proxy_pass http://spring_service/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization $http_authorization;  # 🆕 JWT 전달
            proxy_read_timeout 120s;  # 🆕 타임아웃 추가
            proxy_connect_timeout 60s;
        }

        # 에러 페이지
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
